<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zerodha Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Zerodha MCP</p>
          <h1>Account Console</h1>
        </div>
        <button id="refreshStatus" class="icon-button" title="Refresh account status">Refresh</button>
      </section>

      <section class="status-grid">
        <article class="panel account-panel">
          <div class="panel-heading">
            <h2>Account</h2>
            <span id="mcpState" class="badge">Checking</span>
          </div>
          <div id="profile" class="profile"></div>
          <div class="metric-row">
            <div>
              <span>Available Cash</span>
              <strong id="availableCash">-</strong>
            </div>
            <div>
              <span>Utilised</span>
              <strong id="utilisedMargin">-</strong>
            </div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h2>Holdings</h2>
            <span id="holdingCount" class="muted">0</span>
          </div>
          <div id="holdings" class="table-list"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h2>Positions</h2>
            <span id="positionCount" class="muted">0</span>
          </div>
          <div id="positions" class="table-list"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h2>Orders</h2>
            <span id="orderCount" class="muted">0</span>
          </div>
          <div id="orders" class="table-list"></div>
        </article>
      </section>

      <section class="workspace">
        <article class="panel chat-panel">
          <div class="panel-heading">
            <h2>Agent Chat</h2>
            <span id="threadId" class="muted">New thread</span>
          </div>
          <div id="messages" class="messages"></div>
          <form id="chatForm" class="chat-form">
            <input id="messageInput" type="text" autocomplete="off" placeholder="Ask about holdings, margins, orders, or prepare a trade..." />
            <button type="submit">Send</button>
          </form>
        </article>

        <article class="panel approval-panel">
          <div class="panel-heading">
            <h2>HITL Approvals</h2>
            <span id="approvalCount" class="muted">0 pending</span>
          </div>
          <div id="approvals" class="approval-list"></div>
        </article>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
